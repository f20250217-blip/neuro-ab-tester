<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Loading State -->
  <div id="loading" class="state-loading">
    <div class="loader"></div>
  </div>

  <!-- Main Content -->
  <div id="app" class="app hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.5 2 5 4.5 5 8c0 1.5.5 3 1.5 4C5.5 13 5 14.5 5 16c0 3.5 3.5 6 7 6s7-2.5 7-6c0-1.5-.5-3-1.5-4 1-1 1.5-2.5 1.5-4 0-3.5-3.5-6-7-6z"/>
            <path d="M12 2v20"/><path d="M5 8h14"/><path d="M5 16h14"/>
          </svg>
        </div>
        <span class="brand">NeuroTest</span>
      </div>
      <div class="session-pill">
        <div class="live-dot"></div>
        <span id="sessionTime">0m</span>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="activity">Activity</button>
      <button class="tab" data-tab="effects">Neural Effects</button>
    </nav>

    <!-- ═══ Activity Tab ═══ -->
    <div id="tab-activity" class="tab-panel">
      <!-- Metrics row -->
      <div class="metrics">
        <div class="metric">
          <span class="metric-value" id="totalTime">0m</span>
          <span class="metric-label">Screen time</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
          <span class="metric-value" id="siteCount">0</span>
          <span class="metric-label">Sites</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
          <span class="metric-value" id="topCategory">&mdash;</span>
          <span class="metric-label">Top category</span>
        </div>
      </div>

      <!-- Categories -->
      <section class="section">
        <h2 class="section-title">Categories</h2>
        <div id="categories" class="cat-list"></div>
      </section>

      <!-- Top Sites -->
      <section class="section">
        <h2 class="section-title">Top sites</h2>
        <div id="topSites" class="site-list"></div>
      </section>
    </div>

    <!-- ═══ Effects Tab ═══ -->
    <div id="tab-effects" class="tab-panel hidden">
      <div id="effectsContent"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="analyzeBtn" class="btn-analyze">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Analyze Brain Effects
      </button>
      <div class="btn-row">
        <button id="resetBtn" class="btn-secondary">Reset session</button>
        <button id="fullBtn" class="btn-secondary">Open dashboard <span class="arrow">&nearr;</span></button>
      </div>
    </div>
  </div>

  <!-- Analyzing State -->
  <div id="analyzing" class="state-analyzing hidden">
    <div class="pulse-wrap">
      <div class="pulse-ring r1"></div>
      <div class="pulse-ring r2"></div>
      <svg class="pulse-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7c6cf0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.5 2 5 4.5 5 8c0 1.5.5 3 1.5 4C5.5 13 5 14.5 5 16c0 3.5 3.5 6 7 6s7-2.5 7-6c0-1.5-.5-3-1.5-4 1-1 1.5-2.5 1.5-4 0-3.5-3.5-6-7-6z"/>
        <path d="M12 2v20"/><path d="M5 8h14"/><path d="M5 16h14"/>
      </svg>
    </div>
    <p class="analyze-title">Analyzing patterns</p>
    <p class="analyze-status" id="analyzeStatus">Mapping neural activity...</p>
    <div class="progress-track">
      <div class="progress-bar" id="progressFill"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
