<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Loading State -->
  <div id="loading" class="loading">
    <div class="loader"></div>
    <p>Reading your brain...</p>
  </div>

  <!-- Main Content -->
  <div id="app" class="app hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.5 2 5 4.5 5 8c0 1.5.5 3 1.5 4C5.5 13 5 14.5 5 16c0 3.5 3.5 6 7 6s7-2.5 7-6c0-1.5-.5-3-1.5-4 1-1 1.5-2.5 1.5-4 0-3.5-3.5-6-7-6z"/>
            <path d="M12 2v20"/>
            <path d="M5 8h14"/>
            <path d="M5 16h14"/>
          </svg>
        </div>
        <div>
          <h1 class="brand">NeuroTest AI</h1>
          <p class="brand-sub">Brain Monitor</p>
        </div>
      </div>
      <div class="session-badge">
        <div class="live-dot"></div>
        <span id="sessionTime">0m</span>
      </div>
    </header>

    <!-- Quick Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalTime">0m</div>
        <div class="stat-label">Screen Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="siteCount">0</div>
        <div class="stat-label">Sites Visited</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="topCategory">—</div>
        <div class="stat-label">Top Category</div>
      </div>
    </div>

    <!-- Category Breakdown -->
    <div class="section">
      <div class="section-header">
        <h2>Brain Activity by Category</h2>
      </div>
      <div id="categories" class="category-list"></div>
    </div>

    <!-- Top Sites -->
    <div class="section">
      <div class="section-header">
        <h2>Most Visited</h2>
      </div>
      <div id="topSites" class="site-list"></div>
    </div>

    <!-- Neural Effects (from last analysis) -->
    <div id="effectsSection" class="section hidden">
      <div class="section-header">
        <h2>Neural Effects</h2>
        <span class="badge" id="analyzedTime">—</span>
      </div>
      <div id="effects" class="effects-grid"></div>
      <div id="effectsSummary" class="effects-summary"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="analyzeBtn" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        Analyze Brain Effects
      </button>
      <div class="btn-row">
        <button id="resetBtn" class="btn-secondary">Reset Session</button>
        <button id="fullBtn" class="btn-secondary">Full Analysis &#8599;</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Powered by</span>
      <span class="footer-brand">NeuroTest AI</span>
    </div>
  </div>

  <!-- Analyzing State -->
  <div id="analyzing" class="analyzing hidden">
    <div class="brain-pulse">
      <div class="brain-ring ring-1"></div>
      <div class="brain-ring ring-2"></div>
      <div class="brain-ring ring-3"></div>
      <svg class="brain-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c6cf0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.5 2 5 4.5 5 8c0 1.5.5 3 1.5 4C5.5 13 5 14.5 5 16c0 3.5 3.5 6 7 6s7-2.5 7-6c0-1.5-.5-3-1.5-4 1-1 1.5-2.5 1.5-4 0-3.5-3.5-6-7-6z"/>
        <path d="M12 2v20"/>
        <path d="M5 8h14"/>
        <path d="M5 16h14"/>
      </svg>
    </div>
    <h3>5 AI Agents Analyzing</h3>
    <p id="analyzeStatus">Mapping neural patterns...</p>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
